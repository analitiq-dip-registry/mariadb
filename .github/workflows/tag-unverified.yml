name: Initialize new repo

on:
  push:
    branches: [main]

jobs:
  init-repo:
    runs-on: ubuntu-latest
    # Never run on the template repo itself — only on repos generated from it.
    # The template keeps its REPLACE_REPO_NAME placeholder so generated repos inherit it;
    # running the README fixup here would clobber that placeholder.
    #
    # has_discussions is the init-completion marker: 'Enable discussions' runs LAST below,
    # so under normal operation it only flips to true once every other init step has
    # succeeded. After that, this job skips entirely on routine pushes to main (version
    # bumps, README edits). While init is incomplete the job retries on each push to main —
    # the badge, topic, and protection steps each check current state before writing, so
    # re-runs are safe. The guard is evaluated from the push event payload, so the skip
    # path costs no API calls and no PAT.
    # Caveats: the marker is the repo's discussions setting, which admins can also toggle.
    # Enabling discussions out of band before init finishes stops the retries (finish init
    # manually if that happens); disabling discussions later makes the next push to main
    # re-run init, which re-enables them.
    if: ${{ github.event.repository.is_template == false && github.event.repository.has_discussions == false }}
    # contents: write is for the README badge fixup step below, which commits with the
    # default GITHUB_TOKEN (whose pushes do NOT retrigger workflows — avoids a loop).
    permissions:
      contents: write
    steps:
      # Runs FIRST, before the 'Require validate check on main' step sets branch
      # protection, so the direct push to main is not blocked by the 'validate' check.
      - name: Fill release badge with repo name
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const path = 'README.md';
            const { data: file } = await github.rest.repos.getContent({ owner, repo, path });
            const current = Buffer.from(file.content, 'base64').toString('utf8');
            if (!current.includes('REPLACE_REPO_NAME')) {
              console.log('No REPLACE_REPO_NAME placeholder in README — nothing to do.');
              return;
            }
            const updated = current.split('REPLACE_REPO_NAME').join(repo);
            await github.rest.repos.createOrUpdateFileContents({
              owner, repo, path,
              message: 'chore: fill release badge with repo name',
              content: Buffer.from(updated, 'utf8').toString('base64'),
              sha: file.sha,
            });
            console.log(`README release badge slug set to ${repo}.`);

      - name: Add 'unverified' topic
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const { owner, repo } = context.repo;
            const { data } = await github.rest.repos.getAllTopics({ owner, repo });
            const topics = data.names || [];
            if (!topics.includes('unverified')) {
              topics.push('unverified');
              await github.rest.repos.replaceAllTopics({ owner, repo, names: topics });
            }
            console.log(`Topics set to: ${topics.join(', ')}`);

      - name: Require validate check on main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const { owner, repo } = context.repo;

            // Read existing protection so we merge rather than replace.
            // NOTE: 'validate' matches the job id in validate-definitions.yml — keep in sync.
            let existing = null;
            try {
              ({ data: existing } = await github.rest.repos.getBranchProtection({
                owner, repo, branch: 'main',
              }));
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const existingChecks = existing?.required_status_checks?.checks ?? [];

            if (existingChecks.some(c => c.context === 'validate')) {
              console.log('Branch protection already enforces validate check — nothing to do.');
              return;
            }

            // Merge the new check into whatever protection already exists, preserving all
            // fields so that admin-configured rules are not silently overwritten.
            try {
              await github.rest.repos.updateBranchProtection({
                owner,
                repo,
                branch: 'main',
                required_status_checks: {
                  strict: existing?.required_status_checks?.strict ?? false,
                  checks: [...existingChecks, { context: 'validate' }],
                },
                enforce_admins: existing?.enforce_admins?.enabled ?? false,
                required_pull_request_reviews: existing?.required_pull_request_reviews ?? null,
                restrictions: existing?.restrictions
                  ? {
                      users: existing.restrictions.users.map(u => u.login),
                      teams: existing.restrictions.teams.map(t => t.slug),
                      apps:  existing.restrictions.apps.map(a => a.slug),
                    }
                  : null,
                required_linear_history:        existing?.required_linear_history?.enabled ?? false,
                allow_force_pushes:             existing?.allow_force_pushes?.enabled ?? false,
                allow_deletions:                existing?.allow_deletions?.enabled ?? false,
                required_conversation_resolution: existing?.required_conversation_resolution?.enabled ?? false,
              });
            } catch (e) {
              core.setFailed(
                `Failed to set branch protection on ${owner}/${repo}: HTTP ${e.status} — ${e.message}. ` +
                `Ensure ADMIN_PAT has the 'repo' scope with branch-protection write permission.`
              );
              throw e;
            }

            // GitHub defers enforcement of unknown check contexts until the check has
            // reported at least once on this repo. Log the current state and move on —
            // protection is registered and will activate automatically after the first
            // PR runs the validate workflow.
            try {
              const { data: protection } = await github.rest.repos.getBranchProtection({
                owner, repo, branch: 'main',
              });
              const active = (protection?.required_status_checks?.checks ?? [])
                .some(c => c.context === 'validate');
              if (active) {
                console.log('Branch protection set: validate check required on main');
              } else {
                console.log(
                  "Branch protection written. The 'validate' check context has not run on " +
                  "this repo yet and will be enforced automatically after the first PR."
                );
              }
            } catch (e) {
              console.log(
                `Warning: branch protection was written but verification read failed (HTTP ${e.status}). ` +
                `The protection rule is likely active — verify manually if needed.`
              );
            }

      # Runs LAST on purpose — has_discussions is the init-completion marker; see the
      # job-level guard comment above.
      - name: Enable discussions
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ADMIN_PAT }}
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.update({ owner, repo, has_discussions: true });
            console.log('Discussions enabled — repo initialization complete');
